name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Lint, test, build, and Skylos
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.14"

      - name: Install Python dependencies
        run: uv sync --no-sources --group dev --group qa

      - name: Check Python formatting
        run: uv run --no-sync ruff format --check .

      - name: Check Python types
        run: uvx pyrefly check --summarize-errors

      - name: Check Python lint
        run: uv run --no-sync ruff check .

      - name: Run Python tests
        run: uv run --no-sync pytest

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Check frontend formatting
        working-directory: web
        run: bun run format:check

      - name: Check frontend lint
        working-directory: web
        run: bun run lint

      - name: Check frontend types
        working-directory: web
        run: bun run typecheck:ci

      - name: Build frontend
        working-directory: web
        run: bun run build:ci

      - name: Run Skylos report
        run: uv run --no-sync trapo skylos-check

      - name: Upload Skylos artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: skylos-report
          path: |
            .logs/skylos-report.json
            .logs/skylos-report.sarif.json
          if-no-files-found: warn
          retention-days: 30
